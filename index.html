<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weeknd Mapper</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.86);
        --line: rgba(17, 24, 39, 0.1);
        --text: #0f172a;
        --muted: #5b6478;
        --chip: #e6eaf2;
        --radius: 18px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); }
      #app { position: relative; height: 100%; overflow: hidden; }
      #map { position: absolute; inset: 0; z-index: 1; }
      #map::after {
        content: "";
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(circle at 15% 8%, rgba(96,165,250,0.15), transparent 44%), radial-gradient(circle at 78% 88%, rgba(244,114,182,0.18), transparent 36%);
      }
      .panel {
        position: absolute; top: 12px; left: 12px; bottom: 12px; width: 360px; z-index: 30;
        background: rgba(252, 252, 252, 0.08);
        backdrop-filter: blur(80px);
        -webkit-backdrop-filter: blur(80px);
        border: 1px solid rgba(255, 255, 255, 0.24); border-radius: 22px;
        box-shadow: 0 16px 40px rgba(2, 8, 23, 0.2);
        display: flex; flex-direction: column; overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38), 0 16px 40px rgba(2, 8, 23, 0.2);
      }
      .header { padding: 14px 14px 6px; display: flex; align-items: center; gap: 8px; }
      .brand { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
      .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .share { margin-left: auto; border: 1px solid var(--line); border-radius: 10px; height: 34px; padding: 0 12px; background: #fff; font-weight: 600; cursor: pointer; }
      .grab-wrap { padding: 6px 0 2px; display: flex; justify-content: center; cursor: grab; }
      .grab-wrap:active { cursor: grabbing; }
      .grab-handle {
        width: 44px;
        height: 5px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.24);
      }
      .chevron-toggle {
        margin-left: auto;
        border: 0;
        background: transparent;
        color: #334155;
        font-size: 18px;
        line-height: 1;
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }
      .panel-hint {
        font-size: 11px;
        color: var(--muted);
        padding: 0 14px 6px;
      }
      .controls {
        padding: 8px 12px 12px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        overflow: visible;
      }
      .chip {
        border: 0;
        background: var(--chip-bg, rgba(255,255,255,0.16));
        color: var(--chip-color, #1f2937);
        border-radius: 999px; height: 34px; padding: 0 10px;
        display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer;
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        min-width: 0;
      }
      .chip.active { color: #fff; background: var(--chip-color, #334155); }
      .count {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        background: var(--chip-color, #334155);
        color: #fff;
        font-size: 11px;
        line-height: 20px;
        flex: 0 0 20px;
      }
      .chip.active .count { background: rgba(255,255,255,0.24); }
      .list { padding: 8px; overflow: auto; display: grid; gap: 8px; }
      .collapsed-summary {
        display: none;
        padding: 0 14px 12px;
        color: #334155;
        font-size: 12px;
        font-weight: 600;
      }
      .place {
        border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 14px; background: rgba(252, 252, 252, 0.08);
        padding: 10px; display: grid; grid-template-columns: 34px 1fr auto; gap: 10px; align-items: center; cursor: pointer;
        backdrop-filter: blur(36px);
        -webkit-backdrop-filter: blur(36px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      .place:hover { background: rgba(252, 252, 252, 0.16); }
      .place.selected {
        background: rgba(252, 252, 252, 0.2);
        border-color: rgba(255, 255, 255, 0.42);
      }
      .dot { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 13px; }
      .place h4 { margin: 0; font-size: 14px; }
      .place p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
      .arrow { color: #9ca3af; font-size: 18px; }
      .detail {
        position: absolute; right: 12px; bottom: 12px; width: min(430px, calc(100vw - 408px));
        border: 1px solid rgba(255, 255, 255, 0.24); border-radius: 18px; background: rgba(252, 252, 252, 0.08);
        backdrop-filter: blur(80px);
        -webkit-backdrop-filter: blur(80px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 16px 36px rgba(15,23,42,.22); z-index: 25; padding: 14px; display: none;
      }
      .detail.open { display: block; }
      .detail h3 { margin: 0; font-size: 22px; letter-spacing: -0.02em; }
      .detail .meta { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .detail .note { margin-top: 10px; font-size: 14px; line-height: 1.45; }
      .cta-row {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .cta-btn {
        border: 0;
        border-radius: 10px;
        height: 34px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.68);
        color: #0f172a;
      }
      .meta-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .meta-box {
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.24);
        padding: 8px 10px;
      }
      .meta-k { font-size: 11px; color: var(--muted); }
      .meta-v { margin-top: 3px; font-size: 13px; font-weight: 700; }
      .socials {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .social-link {
        border: 0;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
        color: #0f172a;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.72);
      }
      .pill-row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pill-btn {
        border: 0;
        border-radius: 999px;
        height: 30px;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.72);
        color: #0f172a;
        cursor: pointer;
      }
      .hashes {
        margin-top: 10px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .hash {
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 11px;
        color: #334155;
        background: rgba(255, 255, 255, 0.42);
      }
      .pin {
        width: 28px; height: 28px; border-radius: 999px; border: 2px solid #fff;
        box-shadow: 0 6px 16px rgba(15,23,42,.25); display: grid; place-items: center; color: #fff;
        font-size: 12px; font-weight: 800;
      }
      .leaflet-control-zoom { border: 0 !important; box-shadow: 0 10px 20px rgba(2,8,23,.2); }
      .leaflet-control-zoom a { width: 34px !important; height: 34px !important; line-height: 34px !important; }
      .panel.collapsed {
        height: 86px;
        bottom: auto;
      }
      .panel.collapsed .controls,
      .panel.collapsed .list {
        display: none;
      }
      .panel.collapsed .collapsed-summary {
        display: block;
      }
      .panel.collapsed .panel-hint {
        padding-bottom: 10px;
      }
      .panel.snap-medium {
        top: auto;
        bottom: 10px;
        height: 52vh;
      }
      .panel.snap-full {
        top: 10px;
        bottom: 10px;
        height: auto;
      }

      @media (max-width: 900px) {
        .panel { width: auto; right: 10px; left: 10px; bottom: 10px; top: auto; max-height: 58vh; border-radius: 20px; }
        .detail { width: auto; left: 10px; right: 10px; bottom: calc(58vh + 20px); }
        .chevron-toggle { display: none; }
        .panel.collapsed {
          height: 86px;
          top: auto;
          bottom: 10px;
        }
        .chip {
          font-size: 10px;
          padding: 0 8px;
        }
        .panel.snap-medium {
          height: 56vh;
        }
        .panel.snap-full {
          top: 8px;
          bottom: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <section class="panel">
        <div class="grab-wrap" id="panelGrab" aria-label="Drag to resize panel">
          <div class="grab-handle"></div>
        </div>
        <div class="header">
          <div>
            <div class="brand">Weeknd Mapper</div>
            <div class="sub" id="resultCount">0 saved places</div>
          </div>
          <button class="chevron-toggle" id="panelToggleBtn" type="button" aria-expanded="true" aria-label="Collapse panel">▾</button>
          <button class="share" id="shareBtn" type="button">Share</button>
        </div>
        <div class="panel-hint" id="panelHint">Drag the card up/down to expand or collapse. Use the arrow button near Share on desktop.</div>
        <div class="collapsed-summary" id="collapsedSummary"></div>
        <div id="chips" class="controls"></div>
        <div id="list" class="list"></div>
      </section>
      <aside id="detail" class="detail" aria-live="polite"></aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const categoryColors = {
        all: "#334155",
        cafe: "#FF375F",
        bakery: "#FF9F0A",
        deli: "#BF5AF2",
        restaurant: "#0A84FF"
      };
      const categories = {
        cafe: "Cafes",
        bakery: "Bakery",
        deli: "Delis",
        restaurant: "Restaurants"
      };
      const places = [
        { id: 1, name: "Monmouth Coffee", category: "cafe", area: "Borough", lat: 51.5139, lng: -0.0934, note: "Top single-origin espresso near Borough Market." },
        { id: 2, name: "Regency Cafe", category: "cafe", area: "Pimlico", lat: 51.4937, lng: -0.1327, note: "Old-school London breakfast counter with a lot of character." },
        { id: 3, name: "Kiss the Hippo Fitzrovia", category: "cafe", area: "Fitzrovia", lat: 51.5185, lng: -0.1368, note: "Specialty brews with polished interiors." },
        { id: 4, name: "Fortitude Bakehouse", category: "bakery", area: "Bloomsbury", lat: 51.5186, lng: -0.1317, note: "Excellent laminated pastries and seasonal bakes." },
        { id: 5, name: "The Dusty Knuckle Bakery", category: "bakery", area: "Dalston", lat: 51.5493, lng: -0.0707, note: "Sourdough and savory buns worth the queue." },
        { id: 6, name: "Pophams Islington", category: "bakery", area: "Islington", lat: 51.5407, lng: -0.1028, note: "Flaky pastries and strong coffee pairing." },
        { id: 7, name: "Jolene Bakery", category: "bakery", area: "Newington Green", lat: 51.5504, lng: -0.1088, note: "Natural wine bakery with superb viennoiserie." },
        { id: 8, name: "WatchHouse Somerset House", category: "cafe", area: "Strand", lat: 51.5117, lng: -0.1177, note: "High quality coffee in a refined setting." },
        { id: 9, name: "De Beauvoir Deli", category: "deli", area: "De Beauvoir", lat: 51.5419, lng: -0.0846, note: "Artisan grocer, takeaway, and brunch favorites." },
        { id: 10, name: "Tom's Pasta", category: "restaurant", area: "Hackney Downs", lat: 51.5543, lng: -0.0663, note: "Handmade pasta and lasagne." }
      ].map((p) => {
        const extras = {
          1: { phone: "+44 20 7378 7408", website: "https://www.monmouthcoffee.co.uk", hours: "7:30am-6:00pm", hashtags: ["specialty", "espresso"], socials: { instagram: "https://instagram.com/monmouthcoffee" }, description: "A calm Borough stop for a polished espresso and bean shopping." },
          2: { phone: "+44 20 7821 6596", website: "https://instagram.com/regencycafe", hours: "7:00am-2:30pm", hashtags: ["breakfast", "classic"], socials: { instagram: "https://instagram.com/regencycafe" }, description: "Classic tiled London cafe known for hearty breakfasts." },
          3: { phone: "+44 20 3948 4504", website: "https://www.kissthehippo.com", hours: "7:30am-6:00pm", hashtags: ["specialty", "pour-over"], socials: { instagram: "https://instagram.com/kissthehippo" }, description: "Specialty coffee with a bright, modern vibe in Fitzrovia." },
          4: { phone: "+44 20 3105 0290", website: "https://www.fortitudebakehouse.com", hours: "8:00am-4:00pm", hashtags: ["pastries", "weekend"], socials: { instagram: "https://instagram.com/fortitudebakehouse" }, description: "Small bakery with standout laminated pastries and daily specials." },
          5: { phone: "+44 20 7249 8222", website: "https://www.thedustyknuckle.com", hours: "8:00am-4:00pm", hashtags: ["sourdough", "bread"], socials: { instagram: "https://instagram.com/thedustyknuckle" }, description: "East London favorite for breads, buns, and seasonal sandwiches." },
          6: { phone: "+44 20 7490 4575", website: "https://www.pophamsbakery.com", hours: "8:00am-5:00pm", hashtags: ["pastry", "brunch"], socials: { instagram: "https://instagram.com/pophamsbakery" }, description: "Elegant bakery with excellent viennoiserie and coffee pairings." },
          7: { phone: "+44 20 7502 0998", website: "https://www.jolenecafe.com", hours: "8:30am-4:00pm", hashtags: ["viennoiserie", "artisan"], socials: { instagram: "https://instagram.com/jolene_ngr" }, description: "Neighborhood bakery and natural wine spot with artisan bakes." },
          8: { phone: "+44 20 3475 0775", website: "https://www.watchhouse.com", hours: "7:30am-6:00pm", hashtags: ["flat-white", "workspace"], socials: { instagram: "https://instagram.com/watchhouse" }, description: "Refined coffee setting in Somerset House with plenty of seating." },
          9: { phone: "+44 20 7249 4321", website: "https://thedebeauvoirdeli.co.uk", hours: "8:00am-8:00pm", hashtags: ["deli", "brunch"], socials: { instagram: "https://instagram.com/debeauvoirdeli" }, description: "Deli and cafe with quality pantry items and brunch staples." },
          10: { phone: "", website: "https://www.tomspasta.co.uk", hours: "Tue-Sat 5:30pm-11:00pm", hashtags: ["pasta", "italian"], socials: { instagram: "https://instagram.com/tomspasta" }, description: "Handmade pasta counter known for rich sauces and lasagne." }
        };
        return Object.assign({
          description: p.note,
          hours: "Check website",
          phone: "",
          website: "",
          hashtags: [],
          socials: {},
          liked: false,
          saved: false
        }, p, extras[p.id] || {});
      });

      const state = { active: "all", selectedId: null, panelCollapsed: false };
      const map = L.map("map", { zoomControl: true }).setView([51.5074, -0.1278], 12);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        maxZoom: 20,
        subdomains: "abcd",
        attribution: "&copy; OpenStreetMap &copy; CARTO"
      }).addTo(map);

      const markers = new Map();
      const chipsEl = document.getElementById("chips");
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");
      const resultCountEl = document.getElementById("resultCount");
      const panelEl = document.querySelector(".panel");
      const panelToggleBtn = document.getElementById("panelToggleBtn");
      const panelHintEl = document.getElementById("panelHint");
      const panelGrabEl = document.getElementById("panelGrab");
      const collapsedSummaryEl = document.getElementById("collapsedSummary");

      function filtered() {
        return state.active === "all" ? places : places.filter((p) => p.category === state.active);
      }

      function hexToRgba(hex, alpha) {
        const clean = String(hex || "").replace("#", "");
        const full = clean.length === 3 ? clean.split("").map((c) => c + c).join("") : clean;
        const r = parseInt(full.slice(0, 2), 16);
        const g = parseInt(full.slice(2, 4), 16);
        const b = parseInt(full.slice(4, 6), 16);
        if ([r, g, b].some((n) => Number.isNaN(n))) return "rgba(255,255,255," + alpha + ")";
        return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
      }

      function makePin(place) {
        const color = categoryColors[place.category] || categoryColors.all;
        return L.divIcon({
          className: "",
          html: '<div class="pin" style="background:' + color + ';">' + place.name.slice(0, 1).toUpperCase() + "</div>",
          iconSize: [28, 28],
          iconAnchor: [14, 14]
        });
      }

      function renderChips() {
        const entries = [{ key: "all", label: "All" }].concat(Object.entries(categories).map(([k, label]) => ({ key: k, label })));
        chipsEl.innerHTML = entries.map((e) => {
          const n = e.key === "all" ? places.length : places.filter((p) => p.category === e.key).length;
          const active = state.active === e.key ? "active" : "";
          const color = categoryColors[e.key] || categoryColors.all;
          const chipBg = hexToRgba(color, 0.2);
          const chipBorder = hexToRgba(color, 0.32);
          return '<button class="chip ' + active + '" data-k="' + e.key + '" style="--chip-color:' + color + ";--chip-bg:" + chipBg + ";--chip-border:" + chipBorder + '">' + e.label + ' <span class="count">' + n + "</span></button>";
        }).join("");
        chipsEl.querySelectorAll(".chip").forEach((b) => b.addEventListener("click", () => {
          state.active = b.dataset.k;
          state.selectedId = null;
          detailEl.classList.remove("open");
          renderAll();
        }));
      }

      function renderList() {
        const list = filtered();
        resultCountEl.textContent = list.length + " saved places";
        const selectedPlace = places.find((p) => p.id === state.selectedId);
        collapsedSummaryEl.textContent = selectedPlace
          ? selectedPlace.name + " · " + categories[selectedPlace.category]
          : list.length + " saved places";
        listEl.innerHTML = list.map((p) => {
          const color = categoryColors[p.category] || categoryColors.all;
          const glyph = categories[p.category].slice(0, 1).toUpperCase();
          const selectedClass = state.selectedId === p.id ? "selected" : "";
          return '<article class="place ' + selectedClass + '" data-id="' + p.id + '">' +
            '<div class="dot" style="background:' + color + '">' + glyph + "</div>" +
            "<div><h4>" + p.name + "</h4><p>" + categories[p.category] + " · " + p.area + "</p></div>" +
            '<div class="arrow">›</div>' +
          "</article>";
        }).join("");
        listEl.querySelectorAll(".place").forEach((row) => row.addEventListener("click", () => openPlace(Number(row.dataset.id))));
      }

      function syncMarkers() {
        const visible = new Set(filtered().map((p) => p.id));
        places.forEach((p) => {
          if (!markers.has(p.id)) {
            const m = L.marker([p.lat, p.lng], { icon: makePin(p) }).addTo(map);
            m.on("click", () => openPlace(p.id));
            markers.set(p.id, m);
          }
          const marker = markers.get(p.id);
          if (visible.has(p.id)) marker.addTo(map);
          else map.removeLayer(marker);
        });
      }

      function asTelHref(phone) {
        const digits = String(phone || "").replace(/\s+/g, "");
        return digits ? "tel:" + digits : "";
      }

      function safeUrl(url) {
        if (!url) return "";
        return /^https?:\/\//i.test(url) ? url : "https://" + url;
      }

      function socialLinksHtml(socials) {
        const links = [];
        if (socials.instagram) links.push('<a class="social-link" target="_blank" rel="noopener noreferrer" href="' + safeUrl(socials.instagram) + '">Instagram</a>');
        if (socials.tiktok) links.push('<a class="social-link" target="_blank" rel="noopener noreferrer" href="' + safeUrl(socials.tiktok) + '">TikTok</a>');
        if (socials.x) links.push('<a class="social-link" target="_blank" rel="noopener noreferrer" href="' + safeUrl(socials.x) + '">X</a>');
        if (socials.youtube) links.push('<a class="social-link" target="_blank" rel="noopener noreferrer" href="' + safeUrl(socials.youtube) + '">YouTube</a>');
        return links.join("");
      }

      function openPlace(id) {
        const p = places.find((x) => x.id === id);
        if (!p) return;
        state.selectedId = id;
        map.flyTo([p.lat, p.lng], 14, { duration: 0.7 });
        const telHref = asTelHref(p.phone);
        const websiteHref = safeUrl(p.website);
        const hashtags = (p.hashtags || []).map((t) => '<span class="hash">#' + t + "</span>").join("");
        detailEl.innerHTML =
          "<h3>" + p.name + "</h3>" +
          '<div class="meta">' + categories[p.category] + " · " + p.area + "</div>" +
          '<div class="note">' + p.description + "</div>" +
          '<div class="cta-row">' +
            '<button class="cta-btn" id="dirBtn" type="button">Directions</button>' +
            '<button class="cta-btn" id="callBtn" type="button">Call</button>' +
            '<button class="cta-btn" id="webBtn" type="button">Website</button>' +
          "</div>" +
          '<div class="meta-grid">' +
            '<div class="meta-box"><div class="meta-k">Hours</div><div class="meta-v">' + p.hours + "</div></div>" +
            '<div class="meta-box"><div class="meta-k">Category</div><div class="meta-v">' + categories[p.category] + "</div></div>" +
          "</div>" +
          '<div class="pill-row">' +
            '<button class="pill-btn" id="likeBtn" type="button">' + (p.liked ? "♥ Liked" : "♡ Like") + "</button>" +
            '<button class="pill-btn" id="saveBtn" type="button">' + (p.saved ? "✓ Saved" : "+ Save") + "</button>" +
          "</div>" +
          '<div class="note" style="margin-top:10px;"><strong>Personal notes:</strong> ' + p.note + "</div>" +
          '<div class="hashes">' + hashtags + "</div>" +
          '<div class="socials">' + socialLinksHtml(p.socials || {}) + "</div>";
        detailEl.classList.add("open");
        renderList();
        document.getElementById("dirBtn").addEventListener("click", () => {
          const url = "https://www.google.com/maps/dir/?api=1&destination=" + p.lat + "," + p.lng;
          window.open(url, "_blank");
        });
        document.getElementById("callBtn").addEventListener("click", () => {
          if (!telHref) return;
          window.location.href = telHref;
        });
        document.getElementById("webBtn").addEventListener("click", () => {
          if (!websiteHref) return;
          window.open(websiteHref, "_blank");
        });
        document.getElementById("likeBtn").addEventListener("click", () => {
          p.liked = !p.liked;
          openPlace(p.id);
        });
        document.getElementById("saveBtn").addEventListener("click", () => {
          p.saved = !p.saved;
          openPlace(p.id);
        });
      }

      function renderAll() {
        renderChips();
        renderList();
        syncMarkers();
      }

      document.getElementById("shareBtn").addEventListener("click", () => {
        const shareText = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(shareText).then(() => alert("Link copied."));
        } else {
          prompt("Copy link:", shareText);
        }
      });

      function setPanelCollapsed(collapsed) {
        state.panelCollapsed = collapsed;
        panelEl.classList.toggle("collapsed", collapsed);
        panelEl.classList.remove("snap-medium", "snap-full");
        panelToggleBtn.textContent = collapsed ? "▴" : "▾";
        panelToggleBtn.setAttribute("aria-label", collapsed ? "Expand panel" : "Collapse panel");
        panelToggleBtn.setAttribute("aria-expanded", String(!collapsed));
        panelHintEl.textContent = collapsed
          ? "Card collapsed. Drag up or use the arrow to expand."
          : "Drag the card down to collapse. Use the arrow near Share on desktop.";
        requestAnimationFrame(() => map.invalidateSize({ animate: false }));
      }

      function setPanelSnap(mode) {
        state.panelCollapsed = mode === "collapsed";
        panelEl.classList.toggle("collapsed", mode === "collapsed");
        panelEl.classList.toggle("snap-medium", mode === "medium");
        panelEl.classList.toggle("snap-full", mode === "full");
        panelToggleBtn.textContent = mode === "collapsed" ? "▴" : "▾";
        panelToggleBtn.setAttribute("aria-expanded", String(mode !== "collapsed"));
        panelHintEl.textContent =
          mode === "collapsed"
            ? "Collapsed. Drag up for medium/full."
            : mode === "medium"
            ? "Medium snap. Drag up for full or down to collapse."
            : "Full snap. Drag down for medium/collapsed.";
        requestAnimationFrame(() => map.invalidateSize({ animate: false }));
      }
      panelToggleBtn.addEventListener("click", () => {
        setPanelCollapsed(!panelEl.classList.contains("collapsed"));
      });

      const panelDrag = { active: false, startY: 0, startMode: "full" };
      panelGrabEl.addEventListener("pointerdown", (event) => {
        panelDrag.active = true;
        panelDrag.startY = event.clientY;
        panelDrag.startMode = panelEl.classList.contains("collapsed")
          ? "collapsed"
          : panelEl.classList.contains("snap-medium")
          ? "medium"
          : "full";
      });
      panelGrabEl.addEventListener("pointerup", (event) => {
        if (!panelDrag.active) return;
        const dy = event.clientY - panelDrag.startY;
        panelDrag.active = false;
        if (Math.abs(dy) < 14) {
          if (window.matchMedia("(max-width: 900px)").matches) {
            if (panelDrag.startMode === "collapsed") setPanelSnap("medium");
            else if (panelDrag.startMode === "medium") setPanelSnap("full");
            else setPanelSnap("collapsed");
          } else {
            setPanelCollapsed(!panelEl.classList.contains("collapsed"));
          }
          return;
        }
        if (window.matchMedia("(max-width: 900px)").matches) {
          if (dy < -18) {
            if (panelDrag.startMode === "collapsed") setPanelSnap("medium");
            else setPanelSnap("full");
          } else {
            if (panelDrag.startMode === "full") setPanelSnap("medium");
            else setPanelSnap("collapsed");
          }
        } else {
          if (dy > 0) setPanelCollapsed(true);
          else setPanelCollapsed(false);
        }
      });
      panelGrabEl.addEventListener("pointercancel", () => {
        panelDrag.active = false;
      });

      renderAll();
      requestAnimationFrame(() => map.invalidateSize({ animate: false }));
      window.addEventListener("resize", () => map.invalidateSize({ animate: false }));
    </script>
  </body>
</html>
