<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weeknd Mapper</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #f6f6f4;
        --text: #2f3437;
        --muted: #7d8286;
        --card: #ffffff;
        --soft: #efefec;
        --shadow: 0 8px 26px rgba(35, 39, 42, 0.08);
        --radius: 22px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          "SF Pro Display",
          "SF Pro Text",
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: var(--text);
        background: var(--bg);
      }
      #app {
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      #map {
        position: absolute;
        inset: 0;
        z-index: 1;
        filter: saturate(0.88) contrast(0.96) brightness(1.02);
      }
      .wm-header {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 30;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }
      .wm-header-card {
        background: rgba(246, 246, 244, 0.24);
        border: 1px solid #ecece8;
        border-radius: 14px;
        padding: 10px 14px;
        box-shadow: 0 6px 18px rgba(35, 39, 42, 0.05);
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(20px);
      }
      .wm-header-card h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .wm-header-actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      #map::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.26), transparent 56%),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0));
        z-index: 450;
      }
      .leaflet-control-zoom {
        border: 0 !important;
        border-radius: 14px !important;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
      }
      .leaflet-control-zoom a {
        width: 34px !important;
        height: 34px !important;
        line-height: 34px !important;
        border: 0 !important;
        background: rgba(255, 255, 255, 0.92) !important;
        color: #111827 !important;
      }
      .leaflet-control-attribution {
        margin: 0 8px 8px 0 !important;
        border-radius: 8px !important;
        background: rgba(255, 255, 255, 0.8) !important;
        backdrop-filter: blur(8px);
      }
      .wm-sheet {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 10;
        border-radius: var(--radius);
        background: rgba(246, 246, 244, 0.24);
        border: 1px solid #ecece8;
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow);
        transition: height 0.24s ease, transform 0.24s ease;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        touch-action: none;
      }
      .wm-sheet.closed {
        transform: translateY(calc(100% + 20px));
        pointer-events: none;
      }
      .wm-sheet.peek {
        height: 152px;
      }
      .wm-sheet.full {
        height: min(72vh, 620px);
      }
      .wm-handle-wrap {
        display: flex;
        justify-content: center;
        padding: 10px 0 8px;
      }
      .wm-handle {
        width: 48px;
        height: 5px;
        border-radius: 999px;
        background: #d7d7d2;
        cursor: pointer;
      }
      .wm-sheet-title {
        padding: 0 14px 10px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .wm-sheet-heading {
        display: grid;
        gap: 2px;
      }
      .wm-sheet-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .wm-sheet-title h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
      }
      .wm-count {
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        display: block;
        line-height: 1.55;
      }
      .wm-mini-btn {
        border: 1px solid #cfd2cb;
        background: #f2f3ef;
        color: #111111;
        border-radius: 10px;
        height: 38px;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 560;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .wm-mini-btn:hover {
        background: #ebede7;
      }
      .wm-mini-btn.primary {
        background: #111111;
        border-color: #111111;
        color: #ffffff;
      }
      .wm-mini-btn.primary:hover {
        background: #1d1d1d;
      }
      .wm-mini-btn.danger {
        background: #dc2626;
        border-color: #dc2626;
        color: #ffffff;
      }
      .wm-mini-btn.danger:hover {
        background: #b91c1c;
      }
      .wm-categories {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 0 12px 10px;
        scrollbar-width: none;
      }
      .wm-categories::-webkit-scrollbar {
        display: none;
      }
      .wm-pill {
        border: 1px solid #d8ddd1;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 560;
        cursor: pointer;
        white-space: nowrap;
        background: transparent;
        color: #44505f;
      }
      .wm-icon {
        width: 14px;
        height: 14px;
        display: inline-block;
        vertical-align: -2px;
      }
      .wm-pill .wm-icon {
        margin-right: 6px;
      }
      .wm-pill.active {
        border-color: #1f2937;
        box-shadow: none;
        color: #1f2937;
      }
      .wm-list {
        overflow: auto;
        padding: 0 12px 14px;
        display: grid;
        gap: 10px;
      }
      .wm-sheet.peek .wm-list {
        display: none;
      }
      .wm-place {
        border: 0;
        width: 100%;
        text-align: left;
        border-radius: 16px;
        background: #eceee8;
        border: 1px solid #ecece8;
        padding: 13px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
        cursor: pointer;
      }
      .wm-place-emoji {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: grid;
        place-items: center;
      }
      .wm-place-emoji .wm-icon {
        width: 17px;
        height: 17px;
      }
      .wm-place h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }
      .wm-place p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 12px;
      }
      .wm-chevron {
        color: #9ca3af;
        font-size: 18px;
      }
      .wm-accordion {
        border-radius: 14px;
      }
      .wm-accordion-header {
        width: 100%;
        border: 0;
        background: transparent;
        border-radius: 12px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        color: #4b5563;
        cursor: pointer;
      }
      .wm-accordion-chevron {
        font-size: 14px;
        color: #6b7280;
      }
      .wm-accordion-body {
        display: none;
        gap: 10px;
        padding-top: 8px;
      }
      .wm-accordion-body.open {
        display: grid;
      }
      .wm-empty {
        color: #8b949c;
        font-size: 12px;
        padding: 8px 4px 0;
      }
      .wm-detail {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 20;
        border-radius: var(--radius);
        background: rgba(246, 246, 244, 0.24);
        border: 1px solid #ecece8;
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow);
        padding: 14px;
        transform: translateY(120%);
        transition: transform 0.26s ease;
      }
      .wm-detail.open {
        transform: translateY(0);
      }
      .wm-detail-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .wm-detail h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 650;
      }
      .wm-detail-sub {
        margin-top: 4px;
        font-size: 13px;
        color: var(--muted);
      }
      .wm-detail-copy {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.45;
        color: #31363a;
      }
      .wm-close {
        border: 0;
        background: #ecece9;
        border-radius: 999px;
        width: 34px;
        height: 34px;
        font-size: 16px;
        cursor: pointer;
      }
      .wm-actions {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .wm-action {
        border: 1px solid #cfd2cb;
        background: #f2f3ef;
        border-radius: 12px;
        height: 38px;
        padding: 0 8px;
        font-size: 12px;
        font-weight: 560;
        color: #111111;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .wm-like-row {
        margin-top: 10px;
      }
      .wm-public-actions {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .wm-like-btn {
        width: 100%;
        border: 1px solid #cfd2cb;
        background: #f2f3ef;
        border-radius: 12px;
        height: 38px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 560;
        color: #111111;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .wm-like-btn.on {
        border-color: #e77b92;
        background: #fbe8ee;
        color: #c03a5b;
      }
      .wm-save-btn {
        width: 100%;
        border: 1px solid #cfd2cb;
        background: #f2f3ef;
        border-radius: 12px;
        height: 38px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 560;
        color: #111111;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .wm-save-btn.on {
        border-color: #111111;
        background: #111111;
        color: #ffffff;
      }
      .wm-split {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e8e8e4;
      }
      .wm-split > div {
        padding: 10px;
        background: #f9f9f7;
      }
      .wm-split > div + div {
        border-left: 1px solid #e8e8e4;
      }
      .wm-k {
        color: var(--muted);
        font-size: 11px;
      }
      .wm-v {
        margin-top: 3px;
        font-size: 13px;
        font-weight: 600;
      }
      .wm-notes {
        margin-top: 12px;
        background: #f1f1ee;
        border-radius: 12px;
        padding: 10px;
      }
      .wm-cover {
        margin-top: 12px;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        object-fit: cover;
        border: 1px solid #e8e8e4;
        background: #ecece9;
      }
      .wm-gallery {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }
      .wm-gallery img {
        width: 110px;
        height: 78px;
        border-radius: 10px;
        object-fit: cover;
        border: 1px solid #e8e8e4;
      }
      .wm-socials {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .wm-socials a {
        text-decoration: none;
      }
      .wm-good-title {
        margin: 12px 0 6px;
        font-size: 12px;
        font-weight: 600;
      }
      .wm-good-list {
        display: grid;
        gap: 8px;
      }
      .wm-good-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        font-weight: 400;
        color: #7d8286;
      }
      .wm-good-icon {
        width: 14px;
        height: 14px;
        color: var(--muted);
      }
      .wm-multi-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .wm-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        background: #f4f5f1;
        border: 1px solid #d9ddd4;
        border-radius: 10px;
        padding: 8px 10px;
      }
      .wm-notes h4 {
        margin: 0 0 6px;
        font-size: 12px;
      }
      .wm-notes p {
        margin: 0;
        font-size: 13px;
        color: #334155;
        line-height: 1.4;
      }
      .wm-tags {
        margin-top: 10px;
        display: flex;
        gap: 3px;
        flex-wrap: wrap;
      }
      .wm-tag {
        font-size: 10px;
        font-weight: 560;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        background: transparent;
        color: #4b5563;
        border: 0;
        padding: 4px 9px;
        border-radius: 999px;
      }
      .wm-status-chip {
        display: none;
      }
      .wm-toggles {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }
      .wm-toggle {
        border: 1px solid #d8d9d4;
        background: #f8f8f6;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .wm-toggle.on {
        border-color: #3f464b;
        background: #e8ebed;
        color: #2f3437;
      }
      .pin {
        border-radius: 999px;
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        color: #fff;
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.35);
        font-size: 13px;
      }
      .pin .wm-icon {
        width: 13px;
        height: 13px;
      }
      .wm-user-dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #1d9bf0;
        border: 2px solid #ffffff;
        box-shadow: 0 0 0 6px rgba(29, 155, 240, 0.2);
      }
      .wm-modal {
        position: absolute;
        inset: 0;
        z-index: 40;
        background: rgba(17, 24, 39, 0.2);
        display: none;
        place-items: center;
        padding: 16px;
      }
      .wm-modal.open {
        display: grid;
      }
      .wm-modal-card {
        width: min(560px, 100%);
        max-height: 90vh;
        overflow: auto;
        border-radius: 16px;
        background: #f8f8f6;
        border: 1px solid #e7e8e3;
        box-shadow: 0 16px 34px rgba(17, 24, 39, 0.18);
        padding: 14px;
      }
      .wm-mode-banner {
        position: absolute;
        top: 72px;
        right: 12px;
        z-index: 28;
        max-width: 360px;
        border-radius: 14px;
        border: 1px solid #ecece8;
        background: rgba(248, 248, 246, 0.24);
        box-shadow: 0 8px 20px rgba(35, 39, 42, 0.12);
        padding: 10px 12px;
        display: none;
        backdrop-filter: blur(20px);
      }
      .wm-mode-banner h3 {
        margin: 0;
        font-size: 14px;
      }
      .wm-mode-banner p {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }
      .wm-open-sheet-btn {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        z-index: 34;
        display: none;
      }
      .wm-modal-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .wm-modal-top h3 {
        margin: 0;
        font-size: 18px;
      }
      .wm-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .wm-field {
        display: grid;
        gap: 4px;
      }
      .wm-field.full {
        grid-column: 1 / -1;
      }
      .wm-field label {
        font-size: 12px;
        color: #5f656a;
      }
      .wm-field input:not([type="checkbox"]),
      .wm-field select,
      .wm-field textarea {
        width: 100%;
        border: 1px solid #d8d9d4;
        background: #fff;
        border-radius: 10px;
        padding: 10px;
        font: inherit;
        color: var(--text);
      }
      .wm-field textarea {
        min-height: 80px;
        resize: vertical;
      }
      .wm-modal-actions {
        margin-top: 12px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      @media (max-width: 640px) {
        .wm-header-card h1 {
          font-size: 16px;
        }
        .wm-header-actions {
          display: none;
        }
        .wm-header {
          top: 8px;
          left: 8px;
          right: 8px;
        }
        .wm-sheet {
          left: 8px;
          right: 8px;
          bottom: calc(8px + env(safe-area-inset-bottom));
        }
        .wm-sheet.peek {
          height: 170px;
        }
        .wm-sheet.full {
          height: min(82vh, 760px);
        }
        .wm-sheet-controls {
          gap: 6px;
        }
        .wm-sheet-controls .wm-mini-btn {
          padding: 8px 10px;
          font-size: 11px;
        }
        .wm-pill {
          padding: 10px 13px;
          font-size: 12px;
        }
        .wm-place {
          padding: 14px 12px;
        }
        .wm-place h3 {
          font-size: 16px;
        }
        .wm-place p {
          font-size: 13px;
        }
        .wm-modal {
          padding: 0;
          align-items: end;
        }
        .wm-modal-card {
          width: 100%;
          max-height: 92vh;
          border-radius: 18px 18px 0 0;
          border-left: 0;
          border-right: 0;
          border-bottom: 0;
          padding: 14px 12px calc(14px + env(safe-area-inset-bottom));
        }
        .wm-form-grid {
          grid-template-columns: 1fr;
        }
        .wm-multi-grid {
          grid-template-columns: 1fr;
        }
        .wm-modal-actions {
          position: sticky;
          bottom: 0;
          background: #f8f8f6;
          padding-top: 10px;
        }
        .wm-detail {
          left: 8px;
          right: 8px;
          bottom: calc(8px + env(safe-area-inset-bottom));
          max-height: 78vh;
          overflow: auto;
        }
        .wm-mode-banner {
          top: 64px;
          left: 8px;
          right: 8px;
          max-width: none;
        }
        .wm-open-sheet-btn {
          display: none;
        }
      }
      @media (min-width: 1024px) {
        .wm-header {
          left: 12px;
          right: auto;
          width: 360px;
          justify-content: flex-start;
          top: 12px;
        }
        .wm-header-card {
          width: 100%;
          border-radius: 16px;
          padding: 12px 14px;
        }
        .wm-sheet {
          top: 76px;
          bottom: 12px;
          left: 12px;
          right: auto;
          width: 360px;
          border-radius: 18px;
          height: auto !important;
        }
        .wm-sheet.peek .wm-list {
          display: grid;
        }
        .wm-handle-wrap {
          display: none;
        }
        .wm-sheet-title {
          padding-top: 14px;
        }
        .wm-sheet-controls #shareBtnSheet {
          display: none;
        }
        .wm-detail {
          left: 388px;
          right: 14px;
          max-width: 460px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="wm-header">
        <div class="wm-header-card">
          <h1>Weeknd Mapper</h1>
          <div class="wm-header-actions">
            <button id="shareBtnHeader" class="wm-mini-btn" type="button">Share</button>
          </div>
        </div>
      </header>
      <div id="map"></div>
      <section id="sheet" class="wm-sheet peek" aria-label="Saved places">
        <div class="wm-handle-wrap">
          <div class="wm-handle" id="sheetHandle" aria-label="Toggle list view"></div>
        </div>
        <div class="wm-sheet-title">
          <div class="wm-sheet-heading">
            <h1>Saved Places</h1>
            <span id="resultCount" class="wm-count"></span>
          </div>
          <div class="wm-sheet-controls">
            <button id="closeSheetBtn" class="wm-mini-btn" type="button">Collapse</button>
            <button id="addPlaceBtn" class="wm-mini-btn primary" type="button">Add Place</button>
            <button id="shareBtnSheet" class="wm-mini-btn" type="button">Share</button>
          </div>
        </div>
        <div id="categories" class="wm-categories"></div>
        <div id="placeList" class="wm-list"></div>
      </section>
      <aside id="detail" class="wm-detail" aria-live="polite"></aside>
      <section id="modeBanner" class="wm-mode-banner" aria-live="polite">
        <h3>Private CMS View</h3>
        <p>Add, edit, and delete places. Share links are public read-only guides.</p>
      </section>

      function encodeSharePayload(payload) {
        return btoa(unescape(encodeURIComponent(JSON.stringify(payload))))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      function decodeSharePayload(value) {
        try {
          const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized + "=".repeat((4 - (normalized.length % 4 || 4)) % 4);
          return JSON.parse(decodeURIComponent(escape(atob(padded))));
        } catch (error) {
          return null;
        }
      }

      function sanitizePlace(raw, id) {
        if (!raw || !raw.name || !raw.category || !categories[raw.category]) return null;
        const lat = Number(raw.lat);
        const lng = Number(raw.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
        const gallery = Array.isArray(raw.galleryUrls)
          ? raw.galleryUrls
          : String(raw.galleryUrls || "")
              .split(",")
              .map((url) => url.trim())
              .filter(Boolean);
        const socials = raw.socials && typeof raw.socials === "object" ? raw.socials : {
          instagram: raw.instagram,
          tiktok: raw.tiktok,
          x: raw.x,
          youtube: raw.youtube
        };
        return {
          id,
          name: String(raw.name).trim(),
          category: raw.category,
          status: String(raw.status || "published").toLowerCase() === "draft" ? "draft" : "published",
          lat,
          lng,
          area: String(raw.area || "London").trim(),
          phone: String(raw.phone || "").trim(),
          website: String(raw.website || "").trim(),
          summary: String(raw.summary || "").trim(),
          hours: String(raw.hours || "Check website").trim(),
          notes: String(raw.notes || "Added from your custom places.").trim(),
          coverPhoto: String(raw.coverPhoto || "").trim(),
          galleryUrls: gallery.slice(0, 8),
          socials: {
            instagram: String(socials.instagram || "").trim(),
            tiktok: String(socials.tiktok || "").trim(),
            x: String(socials.x || "").trim(),
            youtube: String(socials.youtube || "").trim()
          },
          goodToKnow: Array.isArray(raw.goodToKnow)
            ? raw.goodToKnow
                .map((item) => String(item || "").trim())
                .filter((key) => goodToKnowOptions.some((option) => option.key === key))
                .slice(0, 8)
            : [],
          tags: Array.isArray(raw.tags)
            ? raw.tags.map((tag) => String(tag).trim()).filter(Boolean).slice(0, 8)
            : []
        };
      }

      function renderGoodToKnowChoices(selected) {
        const active = new Set(Array.isArray(selected) ? selected : []);
        placeGoodToKnowEl.innerHTML = goodToKnowOptions
          .map((option) =>
            '<label class="wm-checkbox">' +
              '<input type="checkbox" name="goodToKnow" value="' + option.key + '" ' + (active.has(option.key) ? "checked" : "") + " />" +
              "<span>" + option.label + "</span>" +
            "</label>"
          )
          .join("");
      }

      function mergePlaces(a, b) {
        const mapByKey = new Map();
        [...a, ...b].forEach((place) => {
          const key = [place.name, place.category, Number(place.lat).toFixed(5), Number(place.lng).toFixed(5)].join("|");
          if (!mapByKey.has(key)) mapByKey.set(key, place);
        });
        return Array.from(mapByKey.values());
      }

      function normalizePlaceIds(list) {
        const used = new Set();
        let nextId = 1;
        return list.map((place) => {
          let id = Number(place.id);
          if (!Number.isInteger(id) || id < 1 || used.has(id)) {
            while (used.has(nextId)) nextId += 1;
            id = nextId;
          }
          used.add(id);
          return { ...place, id };
        });
      }

      function sanitizeCustomList(rawList, startingId) {
        if (!Array.isArray(rawList)) return [];
        let id = startingId;
        return rawList
          .map((place) => {
            const safe = sanitizePlace(place, id);
            if (!safe) return null;
            id += 1;
            return safe;
          })
          .filter(Boolean);
      }

      function loadSharedState() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get("wm");
        if (!encoded) return null;
        const decoded = decodeSharePayload(encoded);
        if (!decoded || typeof decoded !== "object") return null;
        return decoded;
      }

      const sharedState = loadSharedState();
      const isPublicView = Boolean(sharedState && Array.isArray(sharedState.places));

      function loadCmsPlaces() {
        const raw = localStorage.getItem(STORAGE_KEYS.cmsPlaces);
        if (!raw) return normalizePlaceIds(BASE_PLACES);
        try {
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return normalizePlaceIds(BASE_PLACES);
          return normalizePlaceIds(
            parsed
              .map((place, index) => sanitizePlace(place, index + 1))
              .filter(Boolean)
          );
        } catch (error) {
          return normalizePlaceIds(BASE_PLACES);
        }
      }

      function saveCmsPlaces() {
        if (isPublicView) return;
        localStorage.setItem(STORAGE_KEYS.cmsPlaces, JSON.stringify(places));
      }

      let places = isPublicView
        ? normalizePlaceIds(
          sanitizeCustomList(Array.isArray(sharedState?.places) ? sharedState.places : [], 1)

        : loadCmsPlaces();
      let nextPlaceId = Math.max(0, ...places.map((p) => Number(p.id) || 0)) + 1;

      const state = {
        activeCategory: "all",

        sheetOpen: false,
        sheetClosed: false,

      L.marker([51.5074, -0.1278], {

      function haversine(lat1, lon1, lat2, lon2) {
        const toRad = (v) => (v * Math.PI) / 180;
        const R = 6371;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
          Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return (R * c).toFixed(1) + " km";
      }

      function filteredPlaces() {
        const visiblePlaces = isPublicView ? places.filter((p) => p.status !== "draft") : places;
        if (state.activeCategory === "all") return visiblePlaces;
        return visiblePlaces.filter((p) => p.category === state.activeCategory);
      }

      function openPlaceById(id) {
        const place = places.find((p) => Number(p.id) === Number(id));
        openPlace(place);
      }

      function ensureMarkerForPlace(place) {
        if (markers.has(place.id)) return;
        const cat = categories[place.category];
        if (!cat) return;
        const marker = L.marker([place.lat, place.lng], {
          icon: L.divIcon({
            className: "",
            html: '<div class="pin" style="background:' + cat.color + '">' + icons[cat.icon] + "</div>",
            iconSize: [26, 26],
            iconAnchor: [13, 13]
          })
        });
        marker.on("click", () => openPlaceById(place.id));
        marker.addTo(map);
        markers.set(place.id, marker);
      }

      function updatePrivateModeBanner() {
        if (isPublicView || !modeBannerEl) return;
        const desktop = window.matchMedia("(min-width: 1024px)").matches;
        if (desktop) {
          modeBannerEl.style.display = "block";
          return;
        }
        modeBannerEl.style.display = state.sheetOpen ? "none" : "block";
      }

      function setSheet(open) {
        if (window.matchMedia("(min-width: 1024px)").matches) {
          state.sheetClosed = false;
          sheetEl.classList.remove("closed");
          openSheetBtnEl.style.display = "none";
          state.sheetOpen = true;
          sheetEl.classList.add("full");
          sheetEl.classList.remove("peek");
          updatePrivateModeBanner();
          return;
        }
        state.sheetClosed = false;
        sheetEl.classList.remove("closed");
        openSheetBtnEl.style.display = "none";
        state.sheetOpen = open;
        sheetEl.classList.toggle("full", open);
        sheetEl.classList.toggle("peek", !open);
        updatePrivateModeBanner();
      }

      function closeSheet() {
        if (window.matchMedia("(min-width: 1024px)").matches) return;
        state.sheetClosed = false;
        setSheet(false);
      }

      function flyToPlace(place) {
        const zoom = 15;
        if (window.matchMedia("(min-width: 1024px)").matches) {
          const point = map.project([place.lat, place.lng], zoom);
          const shiftedPoint = L.point(point.x - 190, point.y);
          const shiftedLatLng = map.unproject(shiftedPoint, zoom);
          map.flyTo(shiftedLatLng, zoom, { duration: 0.8 });
          return;
        }
        map.flyTo([place.lat, place.lng], zoom, { duration: 0.8 });
      }

      function renderCategories() {
        const entries = [{ key: "all", label: "All", icon: "all", color: "#0f172a" }].concat(
          Object.entries(categories).map(([key, value]) => ({ key, label: value.label, icon: value.icon, color: value.color }))
        );
        categoriesEl.innerHTML = entries
          .map((c) => {
            const active = c.key === state.activeCategory;
            return (
              '<button class="wm-pill ' + (active ? "active" : "") + '" data-category="' + c.key + '">' +
              icons[c.icon] + c.label +
              "</button>"
            );
          })
          .join("");

        categoriesEl.querySelectorAll(".wm-pill").forEach((pill) => {
          pill.addEventListener("click", () => {
            state.activeCategory = pill.dataset.category;
            renderList();
            renderCategories();
            syncMarkerVisibility();
          });
        });
      }

      function renderList() {
        const list = filteredPlaces();
        resultCountEl.textContent = list.length + " saved places";
        const placeCard = (place) => {

            '<button class="wm-place" data-id="' + place.id + '">' +
            '<div class="wm-place-emoji" style="background:' + cat.color + '22; color:' + cat.color + '">' + icons[cat.icon] + "</div>" +
            "<div><h3>" + place.name + "</h3><p>" + cat.label + " • " + place.area + "</p></div>" +
            '<span class="wm-chevron">›</span>' +
            "</button>"
          );
        };

        if (isPublicView) {
          placeListEl.innerHTML = list.map(placeCard).join("");
        } else {
          const groups = [
            { key: "published", label: "Published", items: list.filter((p) => (p.status || "published") === "published") },
            { key: "draft", label: "Draft", items: list.filter((p) => (p.status || "published") === "draft") }
          ];
          placeListEl.innerHTML = groups
            .map((group) => {
              const open = state.groupOpen[group.key];
              const content = group.items.length
                ? group.items.map(placeCard).join("")
                : '<div class="wm-empty">No places in this section.</div>';
              return (
                '<section class="wm-accordion" data-group="' + group.key + '">' +
                '<button class="wm-accordion-header" type="button" data-toggle-group="' + group.key + '">' +
                "<span>" + group.label + " (" + group.items.length + ")</span>" +
                '<span class="wm-accordion-chevron">' + (open ? "▾" : "▸") + "</span>" +
                "</button>" +
                '<div class="wm-accordion-body ' + (open ? "open" : "") + '">' + content + "</div>" +
                "</section>"
              );
            })
            .join("");

          placeListEl.querySelectorAll("[data-toggle-group]").forEach((button) => {
            button.addEventListener("click", () => {
              const key = button.dataset.toggleGroup;
              state.groupOpen[key] = !state.groupOpen[key];
              renderList();
            });
          });
        }

        placeListEl.querySelectorAll(".wm-place").forEach((btn) => {
          btn.addEventListener("click", () => {
            openPlaceById(btn.dataset.id);
          });
        });
      }

      function renderDetail(place) {
        if (!place) return;
        const cat = categories[place.category];
        const userPos = map.getCenter();
        const distance = haversine(userPos.lat, userPos.lng, place.lat, place.lng);
        const showCmsActions = !isPublicView;
        const isLiked = Boolean(state.publicLikes[String(place.id)]);
        const isSaved = Boolean(state.publicSaves[String(place.id)]);
        const coverPhoto = place.coverPhoto ? '<img class="wm-cover" src="' + place.coverPhoto + '" alt="' + place.name + ' cover photo" />' : "";
        const gallery = Array.isArray(place.galleryUrls)
          ? place.galleryUrls.filter(Boolean).slice(0, 8)
          : [];
        const galleryHtml = gallery.length
          ? '<div class="wm-gallery">' + gallery.map((url) => '<img src="' + url + '" alt="' + place.name + ' photo" loading="lazy" />').join("") + "</div>"
          : "";
        const socials = place.socials || {};
        const socialLinks = [
          { key: "instagram", label: "Instagram" },
          { key: "tiktok", label: "TikTok" },
          { key: "x", label: "X" },
          { key: "youtube", label: "YouTube" }
        ].filter((item) => socials[item.key]);
        const summaryText = place.summary || place.notes || "";
        const socialsHtml = socialLinks.length
          ? '<div class="wm-socials">' +
              socialLinks.map((item) => '<a class="wm-mini-btn" href="' + socials[item.key] + '" target="_blank" rel="noopener noreferrer">' + item.label + "</a>").join("") +
            "</div>"
          : "";
        const goodToKnow = Array.isArray(place.goodToKnow) ? place.goodToKnow : [];
        const goodToKnowItems = goodToKnow
          .map((key) => goodToKnowOptions.find((option) => option.key === key))
          .filter(Boolean);
        const goodToKnowHtml = goodToKnowItems.length
          ? '<h4 class="wm-good-title">Good to Know</h4>' +
            '<div class="wm-good-list">' +
              goodToKnowItems.map((item) => '<div class="wm-good-item">' + item.icon + "<span>" + item.label + "</span></div>").join("") +
            "</div>"
          : "";

        detailEl.innerHTML =
          '<div class="wm-detail-top">' +
          "<div>" +
          "<h2>" + place.name + "</h2>" +
          '<div class="wm-detail-sub" style="display:flex;align-items:center;gap:6px;">' + icons[cat.icon] + "<span>" + cat.label + " • " + place.area + "</span></div>" +
          (summaryText ? '<p class="wm-detail-copy">' + summaryText + "</p>" : "") +
          "</div>" +
          '<button class="wm-close" id="closeDetail" aria-label="Close details">✕</button>' +
          "</div>" +
          '<div class="wm-actions">' +
          '<button class="wm-action" id="actDirections">Directions</button>' +
          '<button class="wm-action" id="actCall">Call</button>' +
          '<button class="wm-action" id="actWebsite">Website</button>' +
          "</div>" +
          '<div class="wm-split"><div><div class="wm-k">Hours</div><div class="wm-v">' + place.hours + '</div></div>' +
          '<div><div class="wm-k">Distance</div><div class="wm-v">' + distance + "</div></div></div>" +
          (isPublicView
            ? '<div class="wm-public-actions">' +
                '<button id="likePlaceBtn" class="wm-like-btn ' + (isLiked ? "on" : "") + '" type="button">' +
                  (isLiked ? "♥ Liked" : "♡ Like") +
                "</button>" +
                '<button id="savePlaceBtnPublic" class="wm-save-btn ' + (isSaved ? "on" : "") + '" type="button">' +
                  (isSaved ? "✓ Saved" : "+ Save") +
                "</button>" +
              "</div>"
            : "") +
          coverPhoto +
          galleryHtml +
          socialsHtml +
          goodToKnowHtml +
          '<div class="wm-notes"><h4>Personal Notes</h4><p>' + place.notes + "</p></div>" +
          '<div class="wm-tags">' + place.tags.map((tag) => '<span class="wm-tag">#' + tag + "</span>").join("") + "</div>" +
          (showCmsActions
            ? '<div class="wm-actions" style="margin-top:10px;grid-template-columns:1fr 1fr;">' +
                '<button class="wm-mini-btn primary" id="toggleStatusBtn" type="button">' + (place.status === "draft" ? "Publish" : "Revert to Draft") + "</button>" +
                '<button class="wm-mini-btn" id="editPlaceBtn" type="button">Edit Place</button>' +
              "</div>" +
              '<div class="wm-actions" style="margin-top:8px;grid-template-columns:1fr;">' +
                '<button class="wm-mini-btn danger" id="deletePlaceBtn" type="button">Delete Place</button>' +
              "</div>"
            : "");

        document.getElementById("closeDetail").addEventListener("click", closeDetail);
        document.getElementById("actDirections").addEventListener("click", () => {
          const url = "https://www.google.com/maps/dir/?api=1&destination=" + place.lat + "," + place.lng;
          window.open(url, "_blank");
        });
        document.getElementById("actCall").addEventListener("click", () => {
          window.location.href = "tel:" + place.phone.replace(/\s+/g, "");
        });
        document.getElementById("actWebsite").addEventListener("click", () => window.open(place.website, "_blank"));
        if (isPublicView) {
          document.getElementById("likePlaceBtn").addEventListener("click", () => {
            const key = String(place.id);
            state.publicLikes[key] = !state.publicLikes[key];
            localStorage.setItem(STORAGE_KEYS.publicLikes, JSON.stringify(state.publicLikes));
            renderDetail(place);
          });
          document.getElementById("savePlaceBtnPublic").addEventListener("click", () => {
            const key = String(place.id);
            state.publicSaves[key] = !state.publicSaves[key];
            localStorage.setItem(STORAGE_KEYS.publicSaves, JSON.stringify(state.publicSaves));
            renderDetail(place);
          });
        }
        if (showCmsActions) {
          document.getElementById("toggleStatusBtn").addEventListener("click", () => {
            const nextStatus = place.status === "draft" ? "published" : "draft";
            places = places.map((item) =>
              Number(item.id) === Number(place.id) ? { ...item, status: nextStatus } : item
            );
            saveCmsPlaces();
            const updated = places.find((item) => Number(item.id) === Number(place.id));
            renderList();
            renderCategories();
            syncMarkerVisibility();
            openPlace(updated);
          });
          document.getElementById("editPlaceBtn").addEventListener("click", () => openEditModal(place));
          document.getElementById("deletePlaceBtn").addEventListener("click", () => {
            const confirmed = window.confirm("Delete this place from your CMS?");
            if (!confirmed) return;
            places = places.filter((p) => Number(p.id) !== Number(place.id));
            places = normalizePlaceIds(places);
            nextPlaceId = Math.max(0, ...places.map((p) => Number(p.id) || 0)) + 1;
            saveCmsPlaces();
            if (state.activeCategory !== "all" && filteredPlaces().length === 0) {
              state.activeCategory = "all";
              renderCategories();
            }
            closeDetail();
            renderList();
            syncMarkerVisibility();
          });
        }
      }

      function openPlace(place) {
        if (!place) return;
        state.selectedPlace = place;
        flyToPlace(place);
        renderDetail(place);
        detailEl.classList.add("open");
      }

      function closeDetail() {
        state.selectedPlace = null;
        detailEl.classList.remove("open");
      }

      function syncMarkerVisibility() {
        places.forEach((place) => ensureMarkerForPlace(place));
        const visible = new Set(filteredPlaces().map((p) => p.id));
        places.forEach((place) => {
          const marker = markers.get(place.id);
          if (!marker) return;
          if (visible.has(place.id)) marker.addTo(map);
          else map.removeLayer(marker);
        });
      }

      function openAddModal() {
        const center = map.getCenter();
        addPlaceFormEl.reset();
        editingPlaceIdEl.value = "";
        placeModalTitleEl.textContent = "Add Place";
        savePlaceBtnEl.textContent = "Save Place";
        renderGoodToKnowChoices([]);
        document.getElementById("placeLat").value = center.lat.toFixed(6);
        document.getElementById("placeLng").value = center.lng.toFixed(6);
        document.getElementById("placeStatus").value = "published";
        addModalEl.classList.add("open");
        addModalEl.setAttribute("aria-hidden", "false");
      }

      function openEditModal(place) {
        if (!place) return;
        addPlaceFormEl.reset();
        editingPlaceIdEl.value = String(place.id);
        placeModalTitleEl.textContent = "Edit Place";
        savePlaceBtnEl.textContent = "Update Place";
        document.getElementById("placeName").value = place.name || "";
        document.getElementById("placeCategory").value = place.category || "cafe";
        document.getElementById("placeArea").value = place.area || "";
        document.getElementById("placeLat").value = Number(place.lat).toFixed(6);
        document.getElementById("placeLng").value = Number(place.lng).toFixed(6);
        document.getElementById("placeWebsite").value = place.website || "";
        document.getElementById("placeSummary").value = place.summary || "";
        document.getElementById("placeCoverPhoto").value = place.coverPhoto || "";
        document.getElementById("placeGalleryUrls").value = Array.isArray(place.galleryUrls) ? place.galleryUrls.join(", ") : "";
        document.getElementById("placePhone").value = place.phone || "";
        document.getElementById("placeHours").value = place.hours || "";
        document.getElementById("placeStatus").value = place.status || "published";
        document.getElementById("placeTags").value = Array.isArray(place.tags) ? place.tags.join(", ") : "";
        renderGoodToKnowChoices(place.goodToKnow || []);
        document.getElementById("placeInstagram").value = place.socials?.instagram || "";
        document.getElementById("placeTiktok").value = place.socials?.tiktok || "";
        document.getElementById("placeX").value = place.socials?.x || "";
        document.getElementById("placeYoutube").value = place.socials?.youtube || "";
        document.getElementById("placeNotes").value = place.notes || "";
        addModalEl.classList.add("open");
        addModalEl.setAttribute("aria-hidden", "false");
      }

      function closeAddModal() {
        addModalEl.classList.remove("open");
        addModalEl.setAttribute("aria-hidden", "true");
      }

      function copyShareLink() {
        const payload = {
          v: 1,
          places
        };
        const encoded = encodeSharePayload(payload);
        const url = new URL(window.location.href);
        url.searchParams.set("wm", encoded);
        const shareUrl = url.toString();

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(shareUrl)
            .then(() => window.alert("Public read-only link copied. Anyone with this link can view these places."))
            .catch(() => window.prompt("Copy your public share link:", shareUrl));
        } else {
          window.prompt("Copy your public share link:", shareUrl);
        }
      }

      function populateCategoryField() {
        placeCategoryEl.innerHTML = Object.entries(categories)
          .map(([key, value]) => '<option value="' + key + '">' + value.label + "</option>")
          .join("");
      }

      let dragStartY = null;
      let dragStartOpen = false;

      function sheetDragTargetOk(target) {
        if (target.closest("button, a, input, select, textarea")) return false;
        if (target.closest(".wm-place")) return false;
        if (sheetEl.classList.contains("full") && target.closest(".wm-list")) return false;
        return true;
      }

      function onSheetPointerDown(event) {
        if (window.matchMedia("(min-width: 1024px)").matches) return;
        if (!sheetDragTargetOk(event.target)) return;
        dragStartY = event.clientY;
        dragStartOpen = state.sheetOpen;
        sheetEl.setPointerCapture(event.pointerId);
      }

      function onSheetPointerUp(event) {
        if (dragStartY === null) return;
        if (window.matchMedia("(min-width: 1024px)").matches) {
          dragStartY = null;
          return;
        }
        const delta = event.clientY - dragStartY;
        if (Math.abs(delta) < 10) {
          setSheet(!dragStartOpen);
        } else if (delta < 0) {
          setSheet(true);
        } else {
          setSheet(false);
        }
        dragStartY = null;
        try {
          sheetEl.releasePointerCapture(event.pointerId);
        } catch (err) {
          /* ignore */
        }
      }

      function onSheetPointerCancel() {
        dragStartY = null;
      }

      sheetEl.addEventListener("pointerdown", onSheetPointerDown);
      sheetEl.addEventListener("pointerup", onSheetPointerUp);
      sheetEl.addEventListener("pointercancel", onSheetPointerCancel);

      map.on("click", closeDetail);
      addPlaceBtnEl.addEventListener("click", openAddModal);
      closeSheetBtnEl.addEventListener("click", closeSheet);
      openSheetBtnEl.addEventListener("click", () => setSheet(false));
      closeAddModalEl.addEventListener("click", closeAddModal);
      addModalEl.addEventListener("click", (event) => {
        if (event.target === addModalEl) closeAddModal();
      });
      useMapCenterBtnEl.addEventListener("click", () => {
        const center = map.getCenter();
        document.getElementById("placeLat").value = center.lat.toFixed(6);
        document.getElementById("placeLng").value = center.lng.toFixed(6);
      });
      addPlaceFormEl.addEventListener("submit", (event) => {
        event.preventDefault();
        const formData = new FormData(addPlaceFormEl);
        const editingId = Number(formData.get("editingPlaceId"));
        const normalized = sanitizePlace({
          name: formData.get("name"),
          category: formData.get("category"),
          status: formData.get("status"),
          lat: formData.get("lat"),
          lng: formData.get("lng"),
          area: formData.get("area"),
          phone: formData.get("phone"),
          website: formData.get("website"),
          summary: formData.get("summary"),
          coverPhoto: formData.get("coverPhoto"),
          galleryUrls: String(formData.get("galleryUrls") || "")
            .split(",")
            .map((url) => url.trim())
            .filter(Boolean),
          socials: {
            instagram: formData.get("instagram"),
            tiktok: formData.get("tiktok"),
            x: formData.get("x"),
            youtube: formData.get("youtube")
          },
          hours: formData.get("hours"),
          notes: formData.get("notes"),
          goodToKnow: formData.getAll("goodToKnow"),
          tags: String(formData.get("tags") || "")
            .split(",")
            .map((tag) => tag.trim())
            .filter(Boolean)
        }, nextPlaceId);

        if (!normalized) {
          window.alert("Please provide valid name, category, and coordinates.");
          return;
        }

        if (Number.isInteger(editingId) && editingId > 0) {
          normalized.id = editingId;
          places = places.map((place) => (Number(place.id) === editingId ? normalized : place));
        } else {
          nextPlaceId += 1;
          places = normalizePlaceIds(mergePlaces(places, [normalized]));
        }
        nextPlaceId = Math.max(0, ...places.map((p) => Number(p.id) || 0)) + 1;
        saveCmsPlaces();
        renderList();
        renderCategories();
        syncMarkerVisibility();
        closeAddModal();
        const addedPlace = places.find(
          (p) => Number(p.id) === Number(normalized.id) ||
            (p.name === normalized.name && p.category === normalized.category &&
            Number(p.lat).toFixed(5) === Number(normalized.lat).toFixed(5) &&
            Number(p.lng).toFixed(5) === Number(normalized.lng).toFixed(5))
        );
        openPlace(addedPlace);
      });
      shareBtnSheetEl.addEventListener("click", copyShareLink);
      shareBtnHeaderEl.addEventListener("click", copyShareLink);
      populateCategoryField();

      if (isPublicView) {
        addPlaceBtnEl.style.display = "none";
      } else {
        modeBannerEl.style.display = "block";
      }

      setSheet(false);
      renderCategories();
      renderList();
      syncMarkerVisibility();
      window.addEventListener("resize", () => setSheet(state.sheetOpen));
    </script>
  </body>
</html>
